[package]
name = "tumbler"
version = "2.0.0"
edition = "2021"

[lib]
name = "tumbler_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
tauri = { version = "2", features = [] }
tauri-plugin-dialog = "2"
tauri-plugin-fs = "2"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
uuid = { version = "1", features = ["v4"] }
pdfium-render = { version = "0.9", features = ["pdfium_use_win32", "thread_safe"] }

# Pin time to avoid blanket impl conflict with cookie 0.18
time = "=0.3.41"
