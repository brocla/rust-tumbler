name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-frontend:
    name: Frontend Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm test

  build-rust:
    name: Rust Build
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      - name: Install frontend dependencies
        run: npm ci
      - name: Build frontend
        run: npm run build
      - name: Create placeholder pdfium.dll
        # pdfium.dll is gitignored (downloaded separately); tauri's build
        # script only checks that the resource file exists, it doesn't
        # need to be a real library for `cargo check`.
        working-directory: src-tauri
        run: |
          New-Item -ItemType Directory -Force -Path resources | Out-Null
          if (-not (Test-Path resources/pdfium.dll)) {
            New-Item -ItemType File -Path resources/pdfium.dll | Out-Null
          }
      - name: Check Rust
        working-directory: src-tauri
        run: cargo check
